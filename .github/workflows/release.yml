name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          if [[ "$VERSION" == *"/"* || "$VERSION" == *"\\"* ]]; then
            echo "Invalid version: ${VERSION}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify backend imports
        working-directory: backend
        run: python -c "import app.main"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Package artifacts
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE="mai-${VERSION}"
          rm -rf release dist-artifacts
          mkdir -p "release/${PACKAGE}/backend" "release/${PACKAGE}/frontend" dist-artifacts

          cp -R backend/app "release/${PACKAGE}/backend/app"
          cp backend/requirements.txt backend/.env.example backend/pytest.ini "release/${PACKAGE}/backend/"
          cp -R frontend/dist "release/${PACKAGE}/frontend/dist"
          cp README.md CLAUDE.md "release/${PACKAGE}/"
          cp -R docs "release/${PACKAGE}/docs"

          (cd release && zip -qr "../dist-artifacts/${PACKAGE}.zip" "${PACKAGE}")
          tar -czf "dist-artifacts/${PACKAGE}.tar.gz" -C release "${PACKAGE}"
          (cd dist-artifacts && sha256sum * > SHA256SUMS.txt)

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" dist-artifacts/* --clobber
          else
            gh release create "$VERSION" dist-artifacts/* \
              --target "$GITHUB_SHA" \
              --title "MAI $VERSION" \
              --generate-notes
          fi
