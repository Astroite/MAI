name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  source-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          if [[ "$VERSION" == *"/"* || "$VERSION" == *"\\"* ]]; then
            echo "Invalid version: ${VERSION}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify backend imports
        working-directory: backend
        run: python -c "import app.main"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Package artifacts
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE="mai-${VERSION}"
          rm -rf release dist-artifacts
          mkdir -p "release/${PACKAGE}/backend" "release/${PACKAGE}/frontend" dist-artifacts

          cp -R backend/app "release/${PACKAGE}/backend/app"
          cp backend/requirements.txt backend/.env.example backend/pytest.ini "release/${PACKAGE}/backend/"
          cp -R frontend/dist "release/${PACKAGE}/frontend/dist"
          cp README.md CLAUDE.md "release/${PACKAGE}/"
          cp -R docs "release/${PACKAGE}/docs"

          (cd release && zip -qr "../dist-artifacts/${PACKAGE}.zip" "${PACKAGE}")
          tar -czf "dist-artifacts/${PACKAGE}.tar.gz" -C release "${PACKAGE}"
          (cd dist-artifacts && sha256sum * > SHA256SUMS.txt)

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" dist-artifacts/* --clobber
          else
            gh release create "$VERSION" dist-artifacts/* \
              --target "$GITHUB_SHA" \
              --title "MAI $VERSION" \
              --generate-notes
          fi

  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          if [[ "$VERSION" == *"/"* || "$VERSION" == *"\\"* ]]; then
            echo "Invalid version: ${VERSION}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Strip leading 'v' for tauri.conf.json
          echo "version_number=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable

      - name: Build frontend (for sidecar bundling)
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build PyInstaller sidecar
        shell: bash
        run: |
          python -m PyInstaller backend/mai-backend.spec --noconfirm --distpath frontend/src-tauri/binaries/staging
          cp frontend/src-tauri/binaries/staging/mai-backend.exe frontend/src-tauri/binaries/mai-backend-x86_64-pc-windows-msvc.exe

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: windows-rust-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-rust-

      - name: Inject release version into tauri.conf.json
        shell: bash
        run: |
          VERSION_NUMBER="${{ steps.version.outputs.version_number }}"
          sed -i -E "0,/\"version\": \"[^\"]+\"/s//\"version\": \"${VERSION_NUMBER}\"/" frontend/src-tauri/tauri.conf.json

      - name: Build Tauri installer
        working-directory: frontend
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate updater manifest
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_NUMBER="${{ steps.version.outputs.version_number }}"
          NSIS_DIR="frontend/src-tauri/target/release/bundle/nsis"

          # Find the main installer exe
          INSTALLER=$(find "$NSIS_DIR" -maxdepth 1 -name "*setup.exe" | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "::error::No setup.exe found in $NSIS_DIR"
            exit 1
          fi
          INSTALLER_NAME=$(basename "$INSTALLER")
          DOWNLOAD_URL="https://github.com/Astroite/MAI/releases/download/${VERSION}/${INSTALLER_NAME}"

          # Read the signature from the .sig file
          SIG_FILE=$(find "$NSIS_DIR" -maxdepth 1 -name "*.exe.sig" | head -1)
          if [ -z "$SIG_FILE" ]; then
            echo "::error::No .exe.sig file found. Ensure TAURI_SIGNING_PRIVATE_KEY is set."
            exit 1
          fi
          SIGNATURE=$(cat "$SIG_FILE")

          jq -n \
            --arg ver "$VERSION_NUMBER" \
            --arg notes "MAI $VERSION" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg sig "$SIGNATURE" \
            --arg url "$DOWNLOAD_URL" \
            '{version:$ver, notes:$notes, pub_date:$date, platforms:{"windows-x86_64":{signature:$sig, url:$url}}}' \
            > "$NSIS_DIR/latest.json"
          echo "Generated latest.json:"
          cat "$NSIS_DIR/latest.json"

      - name: Publish installer to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NSIS_DIR="frontend/src-tauri/target/release/bundle/nsis"
          echo "=== Installer artifacts ==="
          find "$NSIS_DIR" -maxdepth 1 \( -name "*.exe" -o -name "*.sig" -o -name "*.zip" -o -name "latest.json" \) -exec echo "  {}" \;
          UPLOAD_FILES=$(find "$NSIS_DIR" -maxdepth 1 \( -name "*setup.exe" -o -name "*.exe.sig" -o -name "*.nsis.zip" -o -name "*.nsis.zip.sig" -o -name "latest.json" \) | sort)
          if [ -z "$UPLOAD_FILES" ]; then
            echo "::error::No artifacts found to upload"
            exit 1
          fi
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "$UPLOAD_FILES" | xargs gh release upload "$VERSION" --clobber
          else
            echo "$UPLOAD_FILES" | xargs gh release create "$VERSION" \
              --target "$GITHUB_SHA" \
              --title "MAI $VERSION" \
              --generate-notes
          fi
